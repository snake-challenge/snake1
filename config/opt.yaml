opt:
  copulashirley:
    categorical_encoder: ORD
    cat_encoder_target: ~
    dp_mechanism: Laplace
    dp_global_sens: 2
    dp_gaussian_delta: ~
    vine_sample_ratio: 0.5
    vine_family_set: onepar  # TODO: all
    vine_par_method: mle
    vine_nonpar_method: constant
    vine_selcrit: aic
    vine_trunc_lvl: ~
    vine_tree_crit: tau

  mst:
    delta: 1.0e-9

  pategan:
    delta: 1.0e-5
    num_teachers: 10
    n_iters: 100
    batch_size: 128
    learning_rate: 1.0e-4

  privbayes:
    histogram_bins: 10
    degree: 1